<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fidget Spinner</title>
        <style>
            .container {
                margin-top: 15%;
                text-align: center;
                justify-content: center;
                align-items: center;
                display: flex;
                flex-direction: column;
                height: 650px;
                width: 500px;
                border-radius: 10%;
                background-color: rgb(0, 0, 0);
                margin-left: 15%;
            }
            img {
                height: 400px;
                width: 400px;
                object-fit: cover;
                border-radius: 37%;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                margin-top: 60px;
                margin-bottom: 90px;
            }
            button {
                padding: 10px 25px;
                font-size: 18px;
                cursor: pointer;
                border: none;
                border-radius: 5px;
                background-color: #f39c12;
                color: white;
                transition: 0.3s;
                font-weight: bold;
                margin-bottom: 40px;
            }
            button:hover {
                background-color: #e67e22;
                box-shadow: 0px 2px 18px 3px #b4b4b4;
            }
            .spinbtn{
                display: flex;
                flex-direction: row;
                gap: 20px;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
            img:hover {
                animation: spin 0.5s linear infinite;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img id="spinner" src="Spinner.png" alt="Spinner">
            <div class="spinbtn">
                <button onclick="btnspin()">Spin</button>
                <button onclick="btnstop()">Stop</button>
            </div>
        </div>

        <script>
            let clickSound = new Audio("ClickSound.mp3");

            function btnspin() {
                clickSound.currentTime = 0;
                clickSound.play();
                document.getElementById("spinner").style.animation = "spin 0.5s linear infinite";
            }
            
            function btnstop() {
                clickSound.currentTime = 0;
                clickSound.play();
                document.getElementById("spinner").style.animation = "none";
            }
        </script>
    </body>
</html>
