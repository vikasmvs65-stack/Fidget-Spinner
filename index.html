<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fidget Spinner</title>
        <style>
            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }
            .container {
                text-align: center;
                justify-content: center;
                align-items: center;
                display: flex;
                flex-direction: column;
                height: 650px;
                width: 500px;
                border-radius: 10%;
                background-color: rgb(0, 0, 0);
            }
            img {
                height: 400px;
                width: 400px;
                object-fit: cover;
                border-radius: 37%;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
                margin-top: 60px;
                margin-bottom: 90px;
            }
            button {
                padding: 10px 25px;
                font-size: 18px;
                cursor: pointer;
                border: none;
                border-radius: 5px;
                color: white;
                transition: 0.3s;
                font-weight: bold;
                margin-bottom: 40px;
            }
            button:hover {
                box-shadow: 0px 2px 18px 3px #b4b4b4;
            }
            .btn-start {
                background-color: #2ecc71;
            }
            .btn-start:hover {
                background-color: #27ae60;
            }
            .btn-stop {
                background-color: #e74c3c;
            }
            .btn-stop:hover {
                background-color: #c0392b;
            }
            .spinbtn{
                display: flex;
                flex-direction: row;
                gap: 20px;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <img id="spinner" src="Spinner.png" alt="Spinner">
            <div class="spinbtn">
                <button id="actionBtn" class="btn-start" onclick="toggleSpin()">Start</button>
            </div>
        </div>

        <script>
            let clickSound = new Audio("ClickSound.mp3");
            let isSpinning = false;

            function toggleSpin() {
                let btn = document.getElementById("actionBtn");
                clickSound.currentTime = 0;
                clickSound.play();
                
                if (!isSpinning) {
                    document.getElementById("spinner").style.animation = "spin 0.5s linear infinite";
                    btn.innerText = "Stop";
                    btn.className = "btn-stop";
                    isSpinning = true;
                } else {
                    document.getElementById("spinner").style.animation = "none";
                    btn.innerText = "Start";
                    btn.className = "btn-start";
                    isSpinning = false;
                }
            }
        </script>
    </body>
</html>
